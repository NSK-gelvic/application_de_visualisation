name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-format-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff  # garde black et ruff pour le lint/format
      
      - name: Run black (format)
        run: black .

      - name: Run black (check formatting)
        run: black --check .

      - name: Run ruff (lint)
        run: ruff check .

      - name: Run tests
        run: pytest
